<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TIME FRANCISCARLOS</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="frontend/css/login.css">
</head>
<body>
    <div class="background">
        <span class="blob blob1"></span>
        <span class="blob blob2"></span>
        <span class="blob blob3"></span>
    </div>
    
    <main class = "login-page">
        <div class="login-card">
            <div class="login-logo">
                <i data-lucide="layout-dashboard"></i>
                <h1>TIME FRANCISCARLOS</h1>
            </div>
            <h2>Bem-Vindo!</h2>
            <p>Faça login utilizando sua conta Google</p>
            <button class="google-btn">
                <img src="frontend/assets/google.svg" alt="Google" class="google-icon">
                Entrar com Google
            </button>
            <small>
                Sistema protegido por OAuth 2.0
            </small>
            <a href="index.html" class="back-home">
                ← Voltar ao início
            </a>
        </div>
    </main>
    
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
